services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      # Map our local project inside for hot-reloading
      - .:/app
      # Keep an anonymous volume for node_modules so local files don't overwrite container node_modules
      - frontend_node_modules:/app/node_modules
    environment:
      # Needed by Vite in some Docker environments to trigger file changes correctly
      - CHOKIDAR_USEPOLLING=true

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "8787:8787"
    volumes:
      # Map our local worker directory for hot-reloading
      - ./worker:/app/worker
    environment:
      - WRANGLER_SEND_METRICS=false

volumes:
  frontend_node_modules:
