<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LeetCode Galaxy</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect unknown paths back to the app root with the path stored as a query param.
      // pathSegmentsToKeep = 1 preserves the repo name segment (/leetcode-galaxy/).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
