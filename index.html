<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <title>LeetCode Galaxy</title>
    <!-- Restore path redirected via 404.html for GitHub Pages SPA routing -->
    <script>
      (function (l) {
        if (l.search.startsWith('?p=')) {
          var qs = l.search.slice(1).split('&');
          var path = decodeURIComponent(qs[0].replace(/^p=/, '').replace(/~and~/g, '&'));
          var query = qs.slice(1).map(function (s) { return decodeURIComponent(s.replace(/^q=/, '').replace(/~and~/g, '&')); }).join('&');
          window.history.replaceState(
            null, null,
            l.pathname.replace(/\/$/, '') + path + (query ? '?' + query : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
